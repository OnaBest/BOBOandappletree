<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobo Bear 苹果树交互游戏</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f7f4;
            font-family: "Microsoft YaHei", sans-serif;
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .tree-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: opacity 1s ease-in-out;
            opacity: 0;
        }

        .active { opacity: 1; }

        #voice-btn {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        #status {
            margin-top: 15px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="state-start" class="tree-layer active" style="background-image: url('图一.png');"></div>
        <div id="state-spring" class="tree-layer" style="background-image: url('图二.png');"></div>
        <div id="state-summer" class="tree-layer" style="background-image: url('图三.png');"></div>
        <div id="state-autumn" class="tree-layer" style="background-image: url('图四.png');"></div>
        <div id="state-winter" class="tree-layer" style="background-image: url('图五.png');"></div>
    </div>

    <button id="voice-btn">🎤 点击并说话</button>
    <p id="status">请说：“春天”、“夏天”、“秋天”或“冬天”</p>

    <script>
        const voiceBtn = document.getElementById('voice-btn');
        const statusText = document.getElementById('status');
        const layers = document.querySelectorAll('.tree-layer');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            statusText.innerText = "抱歉，您的浏览器不支持语音识别，请换用 Chrome。";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';

            voiceBtn.onclick = () => {
                recognition.start();
                statusText.innerText = "正在倾听中...";
            };

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript;
                statusText.innerText = "识别结果：" + result;
                updateTree(result);
            };
        }

        function updateTree(command) {
            layers.forEach(l => l.classList.remove('active'));

            if (command.includes("春")) {
                document.getElementById('state-spring').classList.add('active');
            } else if (command.includes("夏") || command.includes("花")) {
                document.getElementById('state-summer').classList.add('active');
            } else if (command.includes("秋")) {
                document.getElementById('state-autumn').classList.add('active');
            } else if (command.includes("冬")) {
                document.getElementById('state-winter').classList.add('active');
            } else {
                document.getElementById('state-start').classList.add('active');
            }
        }
    </script>
</body>
</html>
