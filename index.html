<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Bobo Bear 语音互动苹果树</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f9fc;
            font-family: sans-serif;
        }

        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .tree-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: opacity 1s ease-in-out;
            opacity: 0;
        }

        .active { opacity: 1; }

        #voice-btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #voice-btn:active { transform: scale(0.95); }
        #status { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="state-start" class="tree-layer active" style="background-image: url('图一.jpg');"></div>
        <div id="state-spring" class="tree-layer" style="background-image: url('图二.jpg');"></div>
        <div id="state-flower" class="tree-layer" style="background-image: url('图三.jpg');"></div>
        <div id="state-autumn" class="tree-layer" style="background-image: url('图四.jpg');"></div>
        <div id="state-winter" class="tree-layer" style="background-image: url('图五.jpg');"></div>
    </div>

    <button id="voice-btn">🎤 点我开始说话</button>
    <p id="status">点击按钮后请说：春天、开花、秋天 或 冬天</p>

    <script>
        const voiceBtn = document.getElementById('voice-btn');
        const statusText = document.getElementById('status');
        const layers = document.querySelectorAll('.tree-layer');

        // 初始化 Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusText.innerText = "您的浏览器不支持语音识别，请使用 Chrome。";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN'; // 设置为中文
            recognition.continuous = false; // 识别一次后停止

            voiceBtn.onclick = () => {
                recognition.start();
                statusText.innerText = "正在倾听...";
                voiceBtn.style.backgroundColor = "#4ecdc4";
            };

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript;
                statusText.innerText = "你说的是: " + result;
                updateTree(result);
            };

            recognition.onend = () => {
                voiceBtn.style.backgroundColor = "#ff6b6b";
            };
        }

        function updateTree(command) {
            layers.forEach(l => l.classList.remove('active'));

            if (command.includes("春")) {
                document.getElementById('state-spring').classList.add('active');
            } else if (command.includes("夏") || command.includes("果")) {
                document.getElementById('state-flower').classList.add('active');
            } else if (command.includes("秋")) {
                document.getElementById('state-autumn').classList.add('active');
            } else if (command.includes("冬")) {
                document.getElementById('state-winter').classList.add('active');
            } else {
                document.getElementById('state-start').classList.add('active');
                statusText.innerText = "没听清，请再说一次季节名。";
            }
        }
    </script>
</body>
</html>
